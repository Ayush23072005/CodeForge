version: '3.8'

services:
  # MongoDB database
  mongodb:
    image: mongo:7
    container_name: codeforge-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API server
  backend:
    build: ./backend
    container_name: codeforge-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/codeforge
      - JWT_SECRET=codeforge-dev-secret-change-in-production
      - JWT_EXPIRE=7d
      - DOCKER_TIMEOUT=5000
      - DOCKER_MEMORY_LIMIT=128m
      - DOCKER_CPU_LIMIT=0.5
      - FRONTEND_URL=http://localhost:5173
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongodb:
        condition: service_healthy

  # Frontend dev server (for development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeforge-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongodb_data:
